<style>
  :root {
    --bg: #0a0c10;
    --card: #1a1d23;
    --border: #2a2f38;
    --text: #e4e8ee;
    --muted: #6b7280;
    --dim: #4a5060;
    --accent: #06D6A0;
    --accent2: #2A9D8F;
    --red: #E63946;
    --orange: #F4A261;
    --teal: #264653;
    --purple: #6A4C93;
    --grey: #8D99AE;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: calc(20px + var(--safe-top)) 16px calc(24px + var(--safe-bottom));
    line-height: 1.5;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'SF Mono', 'Menlo', 'Courier New', monospace; }

  /* Header */
  .header { text-align: center; margin-bottom: 24px; }
  .header .tag { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 18px;
    margin: 0 auto 14px;
    max-width: 520px;
  }

  /* Labels */
  .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 52px 24px;
    text-align: center;
    cursor: pointer;
    max-width: 520px;
    margin: 0 auto;
    transition: border-color 0.2s;
  }
  .upload-zone.active { border-color: var(--accent); background: rgba(6,214,160,0.04); }
  .upload-zone .arrow { font-size: 36px; opacity: 0.4; margin-bottom: 8px; }
  .upload-zone strong { font-size: 15px; display: block; margin-bottom: 4px; }
  .upload-zone .sub { font-size: 12px; color: var(--muted); }
  .upload-zone .hint { font-size: 11px; color: var(--dim); margin-top: 10px; }

  /* Progress */
  .progress-wrap { max-width: 520px; margin: 0 auto 18px; }
  .progress-bar { height: 3px; background: var(--card); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.3s; }
  .progress-text { font-size: 11px; color: var(--muted); text-align: right; margin-top: 4px; }

  /* Transaction display */
  .txn-date { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
  .txn-desc { font-size: 15px; margin-bottom: 6px; word-break: break-word; }
  .txn-amount { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .txn-amount.neg { color: var(--red); }
  .txn-amount.pos { color: var(--accent); }

  /* Buttons: buckets */
  .bucket-grid, .cat-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .bucket-btn, .cat-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: #b0b8c4;
    border-radius: 10px;
    padding: 11px 15px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .bucket-btn:active, .cat-btn:active { transform: scale(0.96); }
  .bucket-btn.selected {
    background: rgba(6,214,160,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }
  .cat-btn[data-color="red"]    { border-color: #E6394655; color: #E63946; }
  .cat-btn[data-color="orange"] { border-color: #F4A26155; color: #F4A261; }
  .cat-btn[data-color="green"]  { border-color: #06D6A055; color: #06D6A0; }
  .cat-btn[data-color="teal"]   { border-color: #26465355; color: #7EAAA0; }
  .cat-btn[data-color="mint"]   { border-color: #2A9D8F55; color: #2A9D8F; }
  .cat-btn[data-color="grey"]   { border-color: #8D99AE55; color: #8D99AE; }

  /* Action buttons */
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-secondary {
    background: transparent;
    border: 1.5px solid var(--border);
    color: #b0b8c4;
    border-radius: 10px;
    padding: 11px 20px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-ghost {
    background: none;
    border: none;
    color: var(--dim);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    text-decoration: underline;
    padding: 4px;
  }
  .btn-add-bucket {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    padding: 4px 0;
  }

  /* New bucket input row */
  .new-bucket-row { display: flex; gap: 8px; margin-top: 10px; }
  .new-bucket-row input {
    flex: 1;
    background: #14161a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    min-width: 0;
  }
  .new-bucket-row button {
    background: var(--border);
    border: none;
    color: #b0b8c4;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  .new-bucket-close {
    background: none !important;
    color: var(--dim) !important;
    font-size: 20px !important;
    padding: 4px 8px !important;
  }

  /* Footer row */
  .footer-row {
    max-width: 520px;
    margin: 0 auto;
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* Summary */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; max-width: 520px; margin: 0 auto 20px; }
  .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 10px; text-align: center; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-val { font-size: 17px; font-weight: 700; }

  .bucket-summary { max-width: 520px; margin: 0 auto; }
  .cat-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #14161a; }
  .cat-row-left { display: flex; align-items: center; gap: 8px; }
  .cat-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .cat-row-name { font-size: 13px; color: #b0b8c4; }
  .cat-row-count { font-size: 11px; color: var(--dim); }
  .bucket-net { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 8px; }

  .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; max-width: 520px; margin: 8px auto 0; }

  /* Review */
  .review-header { display: flex; justify-content: space-between; align-items: center; max-width: 700px; margin: 0 auto 14px; }
  .review-item {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    padding: 10px 12px; background: var(--card); border-radius: 8px;
    margin-bottom: 6px; border: 1px solid var(--border);
    max-width: 700px; margin-left: auto; margin-right: auto;
  }
  .review-item select {
    background: #14161a; color: #b0b8c4; border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px; font-size: 13px; font-family: inherit;
  }

  /* Utility */
  .center { text-align: center; }
  .mb-6 { margin-bottom: 6px; }
  .mb-12 { margin-bottom: 12px; }
  .mb-20 { margin-bottom: 20px; }
  .mb-28 { margin-bottom: 28px; }
  .hidden { display: none; }
</style>

</head>
<body>

<div class="header">
  <div class="tag">Transaction</div>
  <h1>Classifier</h1>
</div>

<div id="app"></div>

<script>
// ---- Data ----
const DEFAULT_BUCKETS = ["Vauxhall Car", "Pet", "Household"];
const CATEGORIES = [
  { name: "Recurring Expenditure", color: "red", hex: "#E63946" },
  { name: "One-off Payment", color: "orange", hex: "#F4A261" },
  { name: "Income", color: "green", hex: "#06D6A0" },
  { name: "Capital", color: "teal", hex: "#264653" },
  { name: "Refund", color: "mint", hex: "#2A9D8F" },
  { name: "Miscellaneous", color: "grey", hex: "#8D99AE" },
];

let state = {
  transactions: [],
  buckets: [...DEFAULT_BUCKETS],
  phase: "upload",
  undoStack: [],
  selectedBucket: null,
  showNewBucket: false,
  newBucketName: "",
};

function getPending() { return state.transactions.filter(t => !t.bucket && !t._skipped); }
function formatMoney(v) {
  const s = v < 0 ? "-" : "";
  return s + "\u00A3" + Math.abs(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

// ---- CSV Parser ----
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const delim = lines[0].includes("\t") ? "\t" : ",";
  const headers = parseLine(lines[0], delim).map(h => h.trim().toLowerCase().replace(/['"]/g, ""));
  const dateIdx = headers.findIndex(h => /date|trans.*date|posted|booking/i.test(h));
  const descIdx = headers.findIndex(h => /desc|narrative|memo|detail|reference|particulars|name/i.test(h));
  const amtIdx = headers.findIndex(h => /amount|value|sum/i.test(h));
  const debIdx = headers.findIndex(h => /debit|out|paid out/i.test(h));
  const credIdx = headers.findIndex(h => /credit|in|paid in|received/i.test(h));
  const txns = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = parseLine(lines[i], delim).map(c => c.trim().replace(/^['"]|['"]$/g, ""));
    let amount = 0;
    if (amtIdx >= 0) amount = parseFloat(cols[amtIdx]?.replace(/[\u00A3$,\s]/g, "")) || 0;
    else {
      const deb = debIdx >= 0 ? parseFloat(cols[debIdx]?.replace(/[\u00A3$,\s]/g, "")) || 0 : 0;
      const cred = credIdx >= 0 ? parseFloat(cols[credIdx]?.replace(/[\u00A3$,\s]/g, "")) || 0 : 0;
      amount = cred > 0 ? cred : -deb;
    }
    txns.push({ id: i, date: cols[dateIdx >= 0 ? dateIdx : 0] || "", description: cols[descIdx >= 0 ? descIdx : Math.min(1, cols.length-1)] || "", amount, bucket: null, category: null, _skipped: false });
  }
  return txns;
}
function parseLine(line, delim) {
  const r = []; let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') inQ = !inQ;
    else if (c === delim && !inQ) { r.push(cur); cur = ""; }
    else cur += c;
  }
  r.push(cur); return r;
}

// ---- Render ----
function render() {
  const app = document.getElementById("app");
  if (state.phase === "upload") app.innerHTML = renderUpload();
  else if (state.phase === "classify") app.innerHTML = renderClassify();
  else if (state.phase === "done") app.innerHTML = renderSummary();
  else if (state.phase === "review") app.innerHTML = renderReview();
  bindEvents();
}

function renderUpload() {
  return `
    <div class="upload-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".csv,.tsv,.txt" style="display:none">
      <div class="arrow">&#8593;</div>
      <strong>Drop your bank CSV here</strong>
      <div class="sub">or tap to browse</div>
      <div class="hint">Works with most UK bank exports</div>
    </div>`;
}

function renderClassify() {
  const pending = getPending();
  const total = state.transactions.length;
  const done = total - pending.length;
  if (pending.length === 0) { state.phase = "done"; return renderSummary(); }
  const t = pending[0];
  const isNeg = t.amount < 0;
  const pct = total > 0 ? (done / total * 100) : 0;

  let bucketBtns = state.buckets.map(b =>
    `<button class="bucket-btn${state.selectedBucket === b ? ' selected' : ''}" data-bucket="${esc(b)}">${esc(b)}</button>`
  ).join("");

  let newBucketHtml = "";
  if (state.showNewBucket) {
    newBucketHtml = `<div class="new-bucket-row">
      <input id="newBucketInput" placeholder="Bucket name" value="${esc(state.newBucketName)}">
      <button id="addBucketBtn">Add</button>
      <button class="new-bucket-close" id="cancelNewBucket">&times;</button>
    </div>`;
  } else {
    newBucketHtml = `<button class="btn-add-bucket" id="showNewBucket">+ New bucket</button>`;
  }

  let catHtml = "";
  if (state.selectedBucket) {
    const catBtns = CATEGORIES.map(c =>
      `<button class="cat-btn" data-color="${c.color}" data-cat="${esc(c.name)}">${esc(c.name)}</button>`
    ).join("");
    catHtml = `<div class="card">
      <div class="label">Step 2: Category in &ldquo;${esc(state.selectedBucket)}&rdquo;</div>
      <div class="cat-grid">${catBtns}</div>
    </div>`;
  }

  let undoBtn = state.undoStack.length > 0 ? `<button class="btn-ghost" id="undoBtn">Undo last</button>` : "";

  return `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${done} of ${total}</div>
    </div>
    <div class="card">
      <div class="txn-date mono">${esc(t.date)}</div>
      <div class="txn-desc">${esc(t.description)}</div>
      <div class="txn-amount mono ${isNeg ? 'neg' : 'pos'}">${formatMoney(t.amount)}</div>
    </div>
    <div class="card">
      <div class="label">Step 1: Choose a bucket</div>
      <div class="bucket-grid mb-12">${bucketBtns}</div>
      ${newBucketHtml}
    </div>
    ${catHtml}
    <div class="footer-row">
      <button class="btn-secondary" id="skipBtn">Skip (not relevant)</button>
      ${undoBtn}
    </div>`;
}

function renderSummary() {
  const classified = state.transactions.filter(t => t.bucket);
  const skipped = state.transactions.filter(t => t._skipped);
  const total = state.transactions.length;

  // Bucket data
  const bd = {};
  state.buckets.forEach(b => { bd[b] = { items: [], out: 0, inc: 0 }; });
  classified.forEach(t => {
    if (!bd[t.bucket]) bd[t.bucket] = { items: [], out: 0, inc: 0 };
    bd[t.bucket].items.push(t);
    const abs = Math.abs(t.amount);
    if (t.category === "Income" || t.category === "Refund") bd[t.bucket].inc += abs;
    else bd[t.bucket].out += abs;
  });
  const grandOut = Object.values(bd).reduce((s, b) => s + b.out, 0);
  const grandIn = Object.values(bd).reduce((s, b) => s + b.inc, 0);
  const net = grandIn - grandOut;

  let bucketCards = Object.entries(bd).filter(([,d]) => d.items.length > 0).map(([name, d]) => {
    let catRows = CATEGORIES.map(cat => {
      const ci = d.items.filter(t => t.category === cat.name);
      if (!ci.length) return "";
      const ct = ci.reduce((s,t) => s + Math.abs(t.amount), 0);
      const col = (cat.name === "Income" || cat.name === "Refund") ? "var(--accent)" : "var(--red)";
      return `<div class="cat-row">
        <div class="cat-row-left"><div class="cat-dot" style="background:${cat.hex}"></div>
        <span class="cat-row-name">${esc(cat.name)}</span><span class="cat-row-count">(${ci.length})</span></div>
        <span class="mono" style="font-size:13px;font-weight:600;color:${col}">${formatMoney(ct)}</span>
      </div>`;
    }).join("");
    const bnet = d.inc - d.out;
    const bnetCol = bnet >= 0 ? "var(--accent)" : "var(--red)";
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:15px;font-weight:600">${esc(name)}</div>
        <div style="font-size:11px;color:var(--muted)">${d.items.length} txn${d.items.length!==1?'s':''}</div>
      </div>
      ${catRows}
      <div class="bucket-net"><span style="font-size:12px;color:var(--muted)">Bucket net</span>
        <span class="mono" style="font-size:14px;font-weight:700;color:${bnetCol}">${formatMoney(bnet)}</span></div>
    </div>`;
  }).join("");

  return `
    <div class="center mb-28">
      <div style="font-size:12px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">Complete</div>
      <div style="font-size:13px;color:var(--muted)">${classified.length} classified, ${skipped.length} skipped, ${total} total</div>
    </div>
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-label">Total Out</div><div class="stat-val mono" style="color:var(--red)">${formatMoney(grandOut)}</div></div>
      <div class="stat-box"><div class="stat-label">Total In</div><div class="stat-val mono" style="color:var(--accent)">${formatMoney(grandIn)}</div></div>
      <div class="stat-box"><div class="stat-label">Net</div><div class="stat-val mono" style="color:${net>=0?'var(--accent)':'var(--red)'}">${formatMoney(net)}</div></div>
    </div>
    <div class="bucket-summary">${bucketCards}</div>
    <div class="actions">
      <button class="btn-primary" id="exportBtn">Export .xlsx</button>
      <button class="btn-secondary" id="reviewBtn">Review & Edit</button>
      <button class="btn-secondary" id="resetBtn" style="color:var(--muted)">Start Over</button>
    </div>`;
}

function renderReview() {
  const items = state.transactions.filter(t => t.bucket || t._skipped);
  let rows = items.map(t => {
    let bucketOpts = `<option value="_skip"${!t.bucket?' selected':''}>Skipped</option>` +
      state.buckets.map(b => `<option value="${esc(b)}"${t.bucket===b?' selected':''}>${esc(b)}</option>`).join("");
    let catSelect = "";
    if (t.bucket) {
      let catOpts = CATEGORIES.map(c => `<option value="${esc(c.name)}"${t.category===c.name?' selected':''}>${esc(c.name)}</option>`).join("");
      catSelect = `<select data-id="${t.id}" data-field="category">${catOpts}</select>`;
    }
    const col = t.amount < 0 ? "var(--red)" : "var(--accent)";
    return `<div class="review-item">
      <span class="mono" style="font-size:11px;color:var(--muted);min-width:68px">${esc(t.date)}</span>
      <span style="font-size:13px;flex:1;min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.description)}</span>
      <span class="mono" style="font-size:13px;font-weight:600;color:${col};min-width:72px;text-align:right">${formatMoney(t.amount)}</span>
      <select data-id="${t.id}" data-field="bucket">${bucketOpts}</select>
      ${catSelect}
    </div>`;
  }).join("");

  return `
    <div class="review-header">
      <div class="label" style="margin-bottom:0">Review</div>
      <button class="btn-secondary" id="backToSummary" style="padding:6px 14px;font-size:12px">Back to Summary</button>
    </div>
    ${rows}`;
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

// ---- Event binding ----
function bindEvents() {
  // Upload
  const dz = document.getElementById("dropZone");
  const fi = document.getElementById("fileInput");
  if (dz && fi) {
    dz.onclick = () => fi.click();
    dz.ondragover = e => { e.preventDefault(); dz.classList.add("active"); };
    dz.ondragleave = () => dz.classList.remove("active");
    dz.ondrop = e => { e.preventDefault(); dz.classList.remove("active"); loadFile(e.dataTransfer.files[0]); };
    fi.onchange = () => loadFile(fi.files[0]);
  }

  // Bucket buttons
  document.querySelectorAll(".bucket-btn").forEach(btn => {
    btn.onclick = () => { state.selectedBucket = btn.dataset.bucket; render(); };
  });

  // Category buttons
  document.querySelectorAll(".cat-btn").forEach(btn => {
    btn.onclick = () => {
      if (!state.selectedBucket) return;
      const pending = getPending();
      if (!pending.length) return;
      const t = pending[0];
      state.undoStack.push(t.id);
      t.bucket = state.selectedBucket;
      t.category = btn.dataset.cat;
      state.selectedBucket = null;
      if (getPending().length === 0) state.phase = "done";
      render();
    };
  });

  // New bucket
  const showNB = document.getElementById("showNewBucket");
  if (showNB) showNB.onclick = () => { state.showNewBucket = true; render(); setTimeout(() => { const inp = document.getElementById("newBucketInput"); if(inp) inp.focus(); }, 50); };
  const cancelNB = document.getElementById("cancelNewBucket");
  if (cancelNB) cancelNB.onclick = () => { state.showNewBucket = false; state.newBucketName = ""; render(); };
  const addBB = document.getElementById("addBucketBtn");
  const nbInput = document.getElementById("newBucketInput");
  if (nbInput) {
    nbInput.oninput = () => { state.newBucketName = nbInput.value; };
    nbInput.onkeydown = e => { if (e.key === "Enter") addNewBucket(); };
  }
  if (addBB) addBB.onclick = addNewBucket;

  // Skip
  const skipBtn = document.getElementById("skipBtn");
  if (skipBtn) skipBtn.onclick = () => {
    const pending = getPending();
    if (!pending.length) return;
    state.undoStack.push(pending[0].id);
    pending[0]._skipped = true;
    state.selectedBucket = null;
    if (getPending().length === 0) state.phase = "done";
    render();
  };

  // Undo
  const undoBtn = document.getElementById("undoBtn");
  if (undoBtn) undoBtn.onclick = () => {
    if (!state.undoStack.length) return;
    const id = state.undoStack.pop();
    const t = state.transactions.find(x => x.id === id);
    if (t) { t.bucket = null; t.category = null; t._skipped = false; }
    state.selectedBucket = null;
    render();
  };

  // Summary actions
  const expBtn = document.getElementById("exportBtn");
  if (expBtn) expBtn.onclick = exportXlsx;
  const revBtn = document.getElementById("reviewBtn");
  if (revBtn) revBtn.onclick = () => { state.phase = "review"; render(); };
  const resBtn = document.getElementById("resetBtn");
  if (resBtn) resBtn.onclick = () => {
    state.transactions = []; state.buckets = [...DEFAULT_BUCKETS];
    state.phase = "upload"; state.undoStack = [];
    state.selectedBucket = null; state.showNewBucket = false; state.newBucketName = "";
    render();
  };

  // Review
  const backBtn = document.getElementById("backToSummary");
  if (backBtn) backBtn.onclick = () => { state.phase = "done"; render(); };
  document.querySelectorAll(".review-item select").forEach(sel => {
    sel.onchange = () => {
      const id = parseInt(sel.dataset.id);
      const t = state.transactions.find(x => x.id === id);
      if (!t) return;
      if (sel.dataset.field === "bucket") {
        t.bucket = sel.value === "_skip" ? null : sel.value;
        t._skipped = !t.bucket;
        if (!t.bucket) t.category = null;
      } else if (sel.dataset.field === "category") {
        t.category = sel.value;
      }
      render();
    };
  });
}

function addNewBucket() {
  const name = state.newBucketName.trim();
  if (!name || state.buckets.includes(name)) return;
  state.buckets.push(name);
  state.selectedBucket = name;
  state.newBucketName = "";
  state.showNewBucket = false;
  render();
}

function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    state.transactions = parseCSV(e.target.result);
    state.phase = "classify";
    render();
  };
  reader.readAsText(file);
}

// ---- Export ----
function exportXlsx() {
  const wb = XLSX.utils.book_new();

  // All transactions
  const all = state.transactions.filter(t => t.bucket || t._skipped).map(t => ({
    Date: t.date, Description: t.description, Amount: t.amount,
    Bucket: t.bucket || "Skipped", Category: t.category || ""
  }));
  const ws1 = XLSX.utils.json_to_sheet(all);
  ws1["!cols"] = [{wch:12},{wch:40},{wch:12},{wch:18},{wch:22}];
  XLSX.utils.book_append_sheet(wb, ws1, "All Transactions");

  // Per bucket
  state.buckets.forEach(bName => {
    const items = state.transactions.filter(t => t.bucket === bName);
    if (!items.length) return;
    const data = items.map(t => ({ Date: t.date, Description: t.description, Amount: Math.abs(t.amount), Category: t.category }));
    data.push({ Date: "", Description: "TOTAL", Amount: items.reduce((s,t) => s + Math.abs(t.amount), 0), Category: "" });
    const ws = XLSX.utils.json_to_sheet(data);
    ws["!cols"] = [{wch:12},{wch:40},{wch:12},{wch:22}];
    XLSX.utils.book_append_sheet(wb, ws, bName.substring(0,31));
  });

  // Summary
  const rows = [];
  state.buckets.forEach(bName => {
    const items = state.transactions.filter(t => t.bucket === bName);
    if (!items.length) return;
    CATEGORIES.forEach(cat => {
      const ci = items.filter(t => t.category === cat.name);
      if (!ci.length) return;
      rows.push({ Bucket: bName, Category: cat.name, Count: ci.length, Total: ci.reduce((s,t) => s + Math.abs(t.amount), 0) });
    });
  });
  const ws2 = XLSX.utils.json_to_sheet(rows);
  ws2["!cols"] = [{wch:20},{wch:22},{wch:8},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws2, "Summary");
  XLSX.writeFile(wb, "transaction-accounts.xlsx");
}

// ---- Init ----
render();
</script>
